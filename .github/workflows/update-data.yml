name: Update dashboard data

on:
  workflow_dispatch:
  schedule:
    # 06:15 UTC daily — adjust to your timezone
    - cron: "15 6 * * *"

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: true

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Fetch data
        env:
          PROPERTY_VALUE_AUD: ${{ vars.PROPERTY_VALUE_AUD }}
        run: npm run data:fetch

      - name: Commit JSON if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data
          if git diff --staged --quiet; then
            echo "No data changes."
          else
            git commit -m "chore(data): refresh public datasets"
            git push
          fi
